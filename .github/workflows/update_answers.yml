name: Update answers

on:
  push:
    paths:
      - 'notes/**'
      - 'data/questions.csv'
      - 'scripts/parse_notes.py'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip | cat
          pip install -r requirements.txt | cat

      - name: Run parser
        run: |
          python scripts/parse_notes.py \
            --notes-dir notes \
            --questions-csv data/questions.csv \
            --out-csv data/answers.csv \
            --out-json data/answers.json | cat

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update answers'
          file_pattern: |
            data/answers.csv
            data/answers.json